<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradiente de fondo circular de alta calidad -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </radialGradient>
    <!-- Gradiente para el trofeo de oro -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259"/>
      <stop offset="70%" stop-color="#ffa751"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Filtro de resplandor (glow) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Fondo redondeado con borde dorado sutil -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" stroke="#fbbf24" stroke-width="1"/>
  
  <!-- Silueta de balón (líneas blancas de red) -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.75"/>
  <path d="M16 5 A11 11 0 0 0 16 27" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
  <path d="M5 16 A11 11 0 0 0 27 16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
  
  <!-- Trofeo Central Estilizado de Oro con Glow -->
  <g filter="url(#glow)">
    <!-- Base -->
    <path d="M12 25 h8 v-2.5 h-8 z" fill="url(#goldGrad)"/>
    <path d="M14 22.5 h4 v-4.5 h-4 z" fill="url(#goldGrad)"/>
    <!-- Copa/Cuerpo -->
    <path d="M11 9 c0 6 2.5 9 5 9 s5-3 5-9 H11 z" fill="url(#goldGrad)"/>
    <!-- Asas del trofeo -->
    <path d="M11 10 C9 10 9 13 11 14" fill="none" stroke="url(#goldGrad)" stroke-width="1.25" stroke-linecap="round"/>
    <path d="M21 10 C23 10 23 13 21 14" fill="none" stroke="url(#goldGrad)" stroke-width="1.25" stroke-linecap="round"/>
    <!-- Balón dorado encima -->
    <circle cx="16" cy="7.5" r="2.5" fill="url(#goldGrad)"/>
  </g>
  
  <!-- Pequeña estrella de campeonato en la esquina superior derecha -->
  <path d="M25 6 l0.5 1.0 l1.1 0.1 l-0.8 0.8 l0.2 1.1 l-1.0 -0.5 l-1.0 0.5 l0.2 -1.1 l-0.8 -0.8 l1.1 -0.1 z" fill="#fbbf24"/>
</svg>
